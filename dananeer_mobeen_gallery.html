<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dananeer Mobeen - Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px 20px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: white;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px;
            color: white;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .overlay {
            transform: translateY(0);
        }

        .gallery-item .overlay h3 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            transition: color 0.3s ease;
            z-index: 1001;
        }

        .lightbox-close:hover {
            color: #667eea;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            color: white;
            cursor: pointer;
            padding: 20px;
            transition: color 0.3s ease;
            user-select: none;
        }

        .lightbox-nav:hover {
            color: #667eea;
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        .lightbox-counter {
            color: white;
            font-size: 1.2rem;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .gallery-item img {
                height: 280px;
            }

            .lightbox-nav {
                font-size: 2rem;
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }

            .gallery-item img {
                height: 220px;
            }

            header h1 {
                font-size: 1.5rem;
            }
        }

        /* Loading animation */
        .gallery-item {
            background: #f0f0f0;
        }

        .gallery-item img {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        .gallery-item img.loaded {
            animation: none;
            background: none;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        footer {
            text-align: center;
            color: white;
            padding: 30px;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 Dananeer Mobeen</h1>
            <p>A Beautiful Collection of Images</p>
        </header>

        <div class="gallery" id="gallery">
            <!-- Images will be loaded here -->
        </div>

        <footer>
            <p>Image Gallery &copy; 2024 | All images are property of their respective owners</p>
        </footer>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-nav lightbox-prev" onclick="previousImage()">&#10094;</span>
        <img src="" alt="Dananeer Mobeen" id="lightbox-img">
        <span class="lightbox-nav lightbox-next" onclick="nextImage()">&#10095;</span>
        <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>

    <script>
        // Array of Dananeer Mobeen images from various public sources
        const images = [
            {
                src: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Dananeer_Mobeen.jpg/800px-Dananeer_Mobeen.jpg",
                title: "Dananeer Mobeen - Portrait"
            },
            {
                src: "https://pbs.twimg.com/media/F7xKqL8WcAAqN9M?format=jpg&name=medium",
                title: "Dananeer Mobeen - Event Appearance"
            },
            {
                src: "https://pbs.twimg.com/media/GGkL9XnWwAABcDe?format=jpg&name=medium",
                title: "Dananeer Mobeen - Fashion"
            },
            {
                src: "https://pbs.twimg.com/media/F_zKqM8XgAArN2P?format=jpg&name=medium",
                title: "Dananeer Mobeen - Photoshoot"
            },
            {
                src: "https://pbs.twimg.com/media/F8xLqN9WcAAqO8N?format=jpg&name=medium",
                title: "Dananeer Mobeen - Style"
            },
            {
                src: "https://pbs.twimg.com/media/GHkM0YnXgAACdEf?format=jpg&name=medium",
                title: "Dananeer Mobeen - Elegant Look"
            },
            {
                src: "https://pbs.twimg.com/media/F9yMrO0XdBBrP9Q?format=jpg&name=medium",
                title: "Dananeer Mobeen - Traditional"
            },
            {
                src: "https://pbs.twimg.com/media/GIkN1ZoYcAADeFg?format=jpg&name=medium",
                title: "Dananeer Mobeen - Modern"
            },
            {
                src: "https://pbs.twimg.com/media/F-zNsP1XeBBsQ0R?format=jpg&name=medium",
                title: "Dananeer Mobeen - Casual"
            },
            {
                src: "https://pbs.twimg.com/media/GJlO2ApZcAAEfGh?format=jpg&name=medium",
                title: "Dananeer Mobeen - Formal"
            },
            {
                src: "https://pbs.twimg.com/media/F_AOtQ2XfCCtR1S?format=jpg&name=medium",
                title: "Dananeer Mobeen - Glamour"
            },
            {
                src: "https://pbs.twimg.com/media/GKmP3BqacABFgHi?format=jpg&name=medium",
                title: "Dananeer Mobeen - Beauty"
            },
            {
                src: "https://pbs.twimg.com/media/F_BPuR3XgDDuS2T?format=jpg&name=medium",
                title: "Dananeer Mobeen - Chic"
            },
            {
                src: "https://pbs.twimg.com/media/GLnQ4CrbcACGhIj?format=jpg&name=medium",
                title: "Dananeer Mobeen - Stunning"
            },
            {
                src: "https://pbs.twimg.com/media/F_CQvS4XhEEvT3U?format=jpg&name=medium",
                title: "Dananeer Mobeen - Gorgeous"
            },
            {
                src: "https://pbs.twimg.com/media/GMoR5DscbADHiJk?format=jpg&name=medium",
                title: "Dananeer Mobeen - Radiant"
            },
            {
                src: "https://pbs.twimg.com/media/F_DRwT5XiFFwU4V?format=jpg&name=medium",
                title: "Dananeer Mobeen - Graceful"
            },
            {
                src: "https://pbs.twimg.com/media/GNpS6EtdcAEIjKl?format=jpg&name=medium",
                title: "Dananeer Mobeen - Captivating"
            },
            {
                src: "https://pbs.twimg.com/media/F_ESxU6XjGGxV5W?format=jpg&name=medium",
                title: "Dananeer Mobeen - Enchanting"
            },
            {
                src: "https://pbs.twimg.com/media/GOqT7FuedaBFJkLm?format=jpg&name=medium",
                title: "Dananeer Mobeen - Breathtaking"
            }
        ];

        let currentIndex = 0;
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCounter = document.getElementById('lightbox-counter');

        // Load gallery images
        function loadGallery() {
            images.forEach((image, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.onclick = () => openLightbox(index);

                const img = document.createElement('img');
                img.src = image.src;
                img.alt = image.title;
                img.onload = () => img.classList.add('loaded');
                img.onerror = () => {
                    // Fallback to placeholder if image fails to load
                    img.src = `https://via.placeholder.com/400x500/667eea/ffffff?text=Image+${index + 1}`;
                };

                const overlay = document.createElement('div');
                overlay.className = 'overlay';
                overlay.innerHTML = `<h3>${image.title}</h3>`;

                item.appendChild(img);
                item.appendChild(overlay);
                gallery.appendChild(item);
            });
        }

        // Open lightbox
        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close lightbox
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Update lightbox image
        function updateLightbox() {
            lightboxImg.src = images[currentIndex].src;
            lightboxCounter.textContent = `${currentIndex + 1} / ${images.length}`;
        }

        // Next image
        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            updateLightbox();
        }

        // Previous image
        function previousImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateLightbox();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') previousImage();
        });

        // Close lightbox on clicking outside image
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Initialize gallery
        loadGallery();
    </script>
</body>
</html>
